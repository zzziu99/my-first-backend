<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#FDF8F5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="校园百事通">
<link rel="manifest" href="/static/manifest.json">
<title>校园百事通</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* ========== TOKENS ========== */
:root {
  /* ---- Color scales (Radix-inspired) ---- */
  --tomato-1: #fffcfc;
  --tomato-2: #fff8f7;
  --tomato-3: #ffefe6;
  --tomato-4: #ffe4d8;
  --tomato-5: #fdd7c8;
  --tomato-6: #f7c5b2;
  --tomato-7: #efb09a;
  --tomato-8: #e8957d;
  --tomato-9: #e54d2e;
  --tomato-10: #db3d1f;
  --tomato-11: #c93216;
  --tomato-12: #5c271f;

  --amber-3: #fef3dd;
  --amber-5: #fce4b3;
  --amber-6: #fad893;
  --amber-7: #f2ce8a;
  --amber-8: #e2a336;
  --amber-9: #ffc53d;
  --amber-10: #e8a622;

  --green-3: #e6f7ed;
  --green-5: #c2f0d0;
  --green-7: #94dbb0;
  --green-8: #64c892;
  --green-9: #30a46c;
  --green-10: #238a59;

  --sand-2: #f7f5f3;
  --sand-3: #edeae6;
  --sand-4: #e2ded9;
  --sand-6: #c5c0ba;
  --sand-8: #a39d97;
  --sand-11: #6b6662;
  --sand-12: #23221f;

  --sp-4:4px;--sp-8:8px;--sp-16:16px;--sp-24:24px;--sp-32:32px;--sp-48:48px;--sp-64:64px;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:20px;--radius-2xl:24px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);

  --font-stack:"Inter","PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,-apple-system,sans-serif;
  --font-2xs:10px;
  --font-caption:11px;
  --font-secondary:12px;
  --font-body:14px;
  --font-title:16px;
  --font-subtitle:18px;
  --font-2xl:20px;
  --font-display:24px;
  --font-kpi:28px;
  --leading-display:1.15;
  --leading-subtitle:1.25;
  --leading-title:1.3;
  --leading-body:1.55;
  --leading-kpi:1;
  --tracking-tight:-0.01em;
  --tracking-normal:0;
  --tracking-wide:0.02em;
  --tracking-wider:0.06em;

  /* ---- Theme tokens ---- */
  --bg: #FDF8F5;
  --surface: #ffffff;
  --text: var(--sand-12);
  --text-secondary: var(--sand-11);
  --text-tertiary: var(--sand-8);
  --text-muted: var(--sand-6);
  --border-light: var(--sand-3);
  --border-hover: var(--sand-4);
  --header-bg: rgba(253,248,245,0.85);
  --nav-bg: rgba(255,255,255,0.92);
  --input-bg: #ffffff;
  --hover-bg: var(--tomato-2);
  --overlay-bg: var(--sand-3);
  --chat-input-bg: rgba(253,248,245,0.92);
  --hero-bg: linear-gradient(135deg,var(--tomato-3),var(--amber-3));
  --skeleton-bg: var(--sand-3);
  --skeleton-shine: var(--sand-2);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06);
  --shadow-md:0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg:0 4px 24px rgba(0,0,0,0.08);

  /* ---- Brand aliases ---- */
  --coral: var(--tomato-9);
  --coral-dark: var(--tomato-10);
  --coral-light: var(--tomato-3);
  --coral-glow: rgba(229,77,46,0.15);
  --sunny: var(--amber-9);
  --sunny-light: var(--amber-3);
  --mint: var(--green-9);
  --mint-light: var(--green-3);
  --slate: var(--sand-11);
  --slate-light: var(--sand-3);
}

/* ========== RESET ========== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{
  font-family:var(--font-stack);
  font-size:var(--font-body);line-height:var(--leading-body);letter-spacing:var(--tracking-normal);
  color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  height:100%;overflow:hidden;
  transition:background .25s ease,color .25s ease;
  text-rendering:optimizeLegibility;font-feature-settings:"kern"1,"tnum"1
}

/* ========== LAYOUT ========== */
.app{max-width:640px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative}
@media(min-width:768px){.app{max-width:680px}}

/* ========== HEADER ========== */
.header{
  position:sticky;top:0;z-index:20;padding:var(--sp-16) var(--sp-24) var(--sp-16);
  background:var(--header-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;padding-top:calc(var(--sp-16) + var(--safe-t))
}
.header-title{font-size:var(--font-subtitle);font-weight:700;line-height:var(--leading-subtitle);letter-spacing:var(--tracking-tight);display:flex;align-items:center;gap:var(--sp-8)}
.header-title i{color:var(--coral)}
.header.scrolled{box-shadow:0 1px 0 var(--border-light)}

/* ========== SCROLL AREA ========== */
.main{flex:1;overflow-y:auto;padding:0 var(--sp-24) 80px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.main::-webkit-scrollbar{width:0}
.tab{display:none;animation:fadeIn .25s ease;touch-action:manipulation}
.tab.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ========== HERO ========== */
.hero{
  background:var(--hero-bg);border-radius:var(--radius-2xl);
  padding:var(--sp-24) var(--sp-24) var(--sp-32);margin-top:var(--sp-8);position:relative;overflow:hidden
}
.hero::before{
  content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;
  background:radial-gradient(circle,var(--coral-glow) 0%,transparent 70%);border-radius:50%
}
.hero h2{font-size:var(--font-display);font-weight:800;line-height:var(--leading-display);letter-spacing:var(--tracking-tight);color:var(--text)}
.hero h2 span{color:var(--coral)}
.hero p{font-size:var(--font-body);color:var(--text-secondary);margin-top:var(--sp-4)}
.hero-badge{
  display:inline-flex;align-items:center;gap:var(--sp-4);margin-top:var(--sp-16);
  background:var(--coral);color:#fff;font-size:var(--font-caption);font-weight:600;letter-spacing:var(--tracking-wider);padding:var(--sp-4) var(--sp-8);border-radius:20px
}
.hero-badge i{width:14px;height:14px}

/* ========== SEARCH BAR ========== */
.search-bar{
  display:flex;align-items:center;gap:var(--sp-8);margin-top:var(--sp-16);
  background:var(--surface);border-radius:var(--radius-xl);padding:0 var(--sp-16);
  box-shadow:var(--shadow-sm);border:1px solid var(--border-light);height:44px
}
.search-bar i{color:var(--text-tertiary);flex-shrink:0}
.search-bar input{
  flex:1;border:none;outline:none;font-size:14px;background:transparent;height:100%
}
.search-bar input::placeholder{color:var(--text-tertiary)}

/* ========== KPI ========== */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-8);margin-top:var(--sp-16)}
.kpi-card{
  background:var(--surface);border-radius:var(--radius-lg);padding:var(--sp-16) var(--sp-16);
  box-shadow:var(--shadow-sm);text-align:center;
  transition:all 200ms ease;cursor:default
}
.kpi-card:hover{transform:translateY(-2px)}
.kpi-value{font-size:var(--font-kpi);font-weight:800;line-height:var(--leading-display);letter-spacing:var(--tracking-tight)}
.kpi-card:nth-child(1) .kpi-value{color:var(--coral)}
.kpi-card:nth-child(2) .kpi-value{color:var(--text)}
.kpi-card:nth-child(3) .kpi-value{color:var(--mint)}
.kpi-label{font-size:var(--font-secondary);color:var(--slate);margin-top:var(--sp-4);letter-spacing:var(--tracking-wider)}

/* ========== SECTION HEADER ========== */
.section-header{
  display:flex;align-items:center;justify-content:space-between;margin:var(--sp-24) 0 var(--sp-16)
}
.section-header h3{font-size:var(--font-title);font-weight:700;line-height:var(--leading-title);letter-spacing:var(--tracking-tight)}
.section-header a{font-size:var(--font-caption);color:var(--coral);text-decoration:none;font-weight:500;letter-spacing:var(--tracking-wider)}

/* ========== QUICK GRID ========== */
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-8)}
.quick-item{
  display:flex;flex-direction:column;align-items:center;gap:var(--sp-8);
  background:var(--surface);border-radius:var(--radius-lg);padding:var(--sp-16) var(--sp-8);
  box-shadow:var(--shadow-sm);cursor:pointer;transition:all 200ms ease;border:none;font-family:inherit;font-size:var(--font-secondary);line-height:var(--leading-display);letter-spacing:var(--tracking-wide);color:var(--text);font-weight:500
}
.quick-item:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.quick-item:active{transform:scale(0.96)}
.quick-icon{
  width:40px;height:40px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center
}
.quick-icon i{width:20px;height:20px;color:#fff}
.quick-icon.coral{background:var(--coral)}
.quick-icon.sunny{background:var(--sunny)}
.quick-icon.mint{background:var(--mint)}
.quick-icon.slate{background:var(--slate)}

/* ========== NOTICE LIST ========== */
.notice-list{display:flex;flex-direction:column;gap:var(--sp-8)}
.notice-item{
  display:flex;align-items:center;gap:var(--sp-16);background:var(--surface);
  border-radius:var(--radius-lg);padding:var(--sp-16) var(--sp-16);box-shadow:var(--shadow-sm);
  cursor:pointer;transition:all 200ms ease
}
.notice-item:hover{transform:translateY(-1px)}
.notice-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.notice-dot.coral{background:var(--coral)}
.notice-dot.sunny{background:var(--sunny)}
.notice-dot.mint{background:var(--mint)}
.notice-text{flex:1;font-size:var(--font-body);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:var(--leading-title)}
.notice-time{font-size:var(--font-caption);color:var(--text-tertiary);flex-shrink:0;letter-spacing:var(--tracking-wider)}

/* ========== BROWSE TAB ========== */
.chip-scroll{
  display:flex;gap:var(--sp-8);overflow-x:auto;padding:var(--sp-4) 0 var(--sp-16);
  -webkit-overflow-scrolling:touch;scrollbar-width:none
}
.chip-scroll::-webkit-scrollbar{display:none}
.chip{
  white-space:nowrap;padding:var(--sp-4) var(--sp-16);border-radius:20px;font-size:var(--font-secondary);font-weight:500;letter-spacing:var(--tracking-wide);
  border:none;cursor:pointer;transition:all 200ms ease;font-family:inherit;line-height:var(--leading-display);
  background:var(--overlay-bg);color:var(--text-secondary)
}
.chip:hover{background:var(--coral-light);color:var(--coral)}
.chip.active{background:var(--coral);color:#fff}

.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--sp-8);margin-top:var(--sp-4)}
.cat-card{
  display:flex;align-items:center;gap:var(--sp-16);background:var(--surface);border-radius:var(--radius-lg);
  padding:var(--sp-16);box-shadow:var(--shadow-sm);cursor:pointer;transition:all 200ms ease;border:none;font-family:inherit;text-align:left
}
.cat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.cat-card:active{transform:scale(0.97)}
.cat-card-icon{
  width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.cat-card-icon i{width:18px;height:18px;color:#fff}
.cat-card-info{flex:1;min-width:0}
.cat-card-name{font-size:var(--font-body);font-weight:600;line-height:var(--leading-title);color:var(--text)}
.cat-card-count{font-size:var(--font-caption);color:var(--text-tertiary);margin-top:2px;letter-spacing:var(--tracking-wider)}
.cat-card-arrow{color:var(--text-muted);flex-shrink:0}

/* ========== CHAT TAB ========== */
.chat-area{display:flex;flex-direction:column;padding-bottom:var(--sp-8)}
.chat-msg{display:flex;gap:var(--sp-8);margin-bottom:var(--sp-16);animation:fadeIn .3s ease}
.chat-msg.user{flex-direction:row-reverse}
.chat-avatar{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:12px;font-weight:700;color:#fff
}
.chat-avatar.bot{background:var(--coral)}
.typing-dots span{animation:dotPulse 1.4s infinite;opacity:0;font-size:24px;line-height:1}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%{opacity:0}50%{opacity:1}100%{opacity:0}}
.chat-avatar.user{background:var(--slate)}
.chat-bubble{
  max-width:80%;padding:var(--sp-16) var(--sp-16);border-radius:var(--radius-lg);
  font-size:var(--font-body);line-height:var(--leading-body);letter-spacing:var(--tracking-wide)
}
.chat-msg.bot .chat-bubble{background:var(--surface);box-shadow:var(--shadow-sm);border-bottom-left-radius:var(--sp-4)}
.chat-msg.user .chat-bubble{background:var(--coral);color:#fff;border-bottom-right-radius:var(--sp-4)}
.chat-msg.user .chat-bubble a{color:rgba(255,255,255,0.85);text-decoration:underline}
.chat-welcome{
  text-align:center;padding:var(--sp-32) var(--sp-16) var(--sp-24)
}
.chat-welcome .logo{
  width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--coral),var(--coral-dark));
  display:flex;align-items:center;justify-content:center;margin:0 auto var(--sp-16)
}
.chat-welcome .logo i{width:28px;height:28px;color:#fff}
.chat-welcome h3{font-size:var(--font-subtitle);font-weight:700;line-height:var(--leading-subtitle);letter-spacing:var(--tracking-tight)}
.chat-welcome p{font-size:var(--font-body);color:var(--slate);margin-top:var(--sp-4);line-height:var(--leading-title)}
.quick-chips{display:flex;flex-wrap:wrap;gap:var(--sp-8);justify-content:center;margin-top:var(--sp-16)}
.quick-chip{
  padding:8px var(--sp-16);border-radius:20px;font-size:var(--font-secondary);font-weight:500;letter-spacing:var(--tracking-wide);line-height:var(--leading-display);
  background:var(--coral-light);color:var(--coral-dark);border:none;cursor:pointer;
  transition:all 200ms ease;font-family:inherit
}
.quick-chip:hover{background:var(--coral);color:#fff}

.chat-input-bar{
  position:sticky;bottom:0;background:var(--chat-input-bg);backdrop-filter:blur(12px);
  padding:var(--sp-8) 0 var(--sp-8);
  display:flex;gap:var(--sp-8);align-items:center;
  box-shadow:0 -1px 0 var(--border-light);
  padding-bottom:calc(var(--sp-8) + var(--safe-b))
}
.chat-input{
  flex:1;height:42px;border-radius:21px;border:1px solid var(--border-light);
  padding:0 var(--sp-16);font-size:var(--font-body);outline:none;background:var(--surface);font-family:inherit;letter-spacing:var(--tracking-wide)
}
.chat-input:focus{border-color:var(--coral)}
.chat-send{
  width:42px;height:42px;border-radius:50%;background:var(--coral);color:#fff;
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 200ms ease;flex-shrink:0
}
.chat-send:hover{transform:scale(1.05)}
.chat-send:active{transform:scale(0.95)}
.chat-send i{width:18px;height:18px;color:#fff}

/* ========== PROFILE TAB ========== */
.profile-card{
  background:linear-gradient(135deg,var(--coral),var(--coral-dark));border-radius:var(--radius-2xl);
  padding:var(--sp-24);margin-top:var(--sp-8);color:#fff;position:relative;overflow:hidden
}
.profile-card::before{
  content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;
  background:rgba(255,255,255,0.08);border-radius:50%
}
.profile-row{display:flex;align-items:center;gap:var(--sp-16)}
.profile-avatar{
  width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700
}
.profile-info h3{font-size:var(--font-subtitle);font-weight:700;line-height:var(--leading-subtitle);letter-spacing:var(--tracking-tight)}
.profile-info p{font-size:var(--font-body);opacity:0.8;margin-top:2px;line-height:var(--leading-title)}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-8);margin-top:var(--sp-24)}
.profile-stat{text-align:center}
.profile-stat-num{font-size:var(--font-2xl);font-weight:700;line-height:var(--leading-kpi);letter-spacing:var(--tracking-tight)}
.profile-stat-label{font-size:var(--font-caption);opacity:0.7;margin-top:2px;letter-spacing:var(--tracking-wider)}

.profile-section{margin-top:var(--sp-24)}
.profile-section h4{font-size:var(--font-title);font-weight:700;line-height:var(--leading-title);letter-spacing:var(--tracking-tight);margin-bottom:var(--sp-8)}
.profile-list{display:flex;flex-direction:column;gap:2px;background:var(--surface);border-radius:var(--radius-lg);overflow:hidden}
.profile-item{
  display:flex;align-items:center;gap:var(--sp-16);padding:var(--sp-16) var(--sp-16);
  cursor:pointer;transition:background 200ms ease;border:none;background:var(--surface);font-family:inherit;font-size:var(--font-body);line-height:var(--leading-title);letter-spacing:var(--tracking-wide);color:var(--text);text-align:left;width:100%
}
.profile-item:hover{background:var(--hover-bg)}
.profile-item:active{background:var(--coral-light)}
.profile-item i:first-child{color:var(--coral);width:20px;height:20px}
.profile-item .spacer{flex:1}
.profile-item .arrow{color:var(--text-muted);width:16px;height:16px}
.profile-item .badge{
  font-size:11px;background:var(--coral);color:#fff;padding:2px 8px;border-radius:10px;font-weight:600
}

/* ========== BOTTOM NAV ========== */
.nav{
  position:fixed;bottom:var(--sp-16);left:50%;transform:translateX(-50%);z-index:30;
  display:flex;align-items:center;gap:var(--sp-4);
  background:var(--nav-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:var(--radius-2xl);padding:var(--sp-4);
  box-shadow:var(--shadow-lg);
  padding-bottom:calc(var(--sp-4) + var(--safe-b)*0.3);
  max-width:calc(100vw - 32px)
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:var(--sp-4);
  padding:var(--sp-4) var(--sp-16);border-radius:var(--radius-xl);border:none;background:transparent;
  cursor:pointer;transition:all 200ms ease;font-family:inherit;min-width:56px;touch-action:manipulation
}
.nav-btn i{width:22px;height:22px;color:var(--text-tertiary);transition:color 200ms ease}
.nav-btn span{font-size:var(--font-2xs);color:var(--text-tertiary);font-weight:500;transition:color 200ms ease}
.nav-btn.active{background:var(--coral)}
.nav-btn.active i,.nav-btn.active span{color:#fff}
.nav-btn:active{transform:scale(0.92)}

/* ========== OVERLAY/DETAIL ========== */
.detail-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:40;
  background:var(--bg);display:none;flex-direction:column;animation:slideUp .3s ease
}
.detail-overlay.open{display:flex}
.detail-overlay.closing{animation:slideDown .25s ease forwards}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideDown{from{transform:translateY(0)}to{transform:translateY(100%)}}
.detail-header{
  display:flex;align-items:center;gap:var(--sp-16);padding:var(--sp-16) var(--sp-16);
  padding-top:calc(var(--sp-16) + var(--safe-t));
  background:var(--header-bg);backdrop-filter:blur(12px);position:sticky;top:0;z-index:1
}
.detail-back{
  width:36px;height:36px;border-radius:50%;border:none;background:var(--overlay-bg);
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 200ms ease
}
.detail-back:hover{background:var(--border-hover)}
.detail-back i{width:18px;height:18px;color:var(--text)}
.detail-title{font-size:var(--font-title);font-weight:700;line-height:var(--leading-title);letter-spacing:var(--tracking-tight)}
.detail-body{flex:1;overflow-y:auto;padding:var(--sp-8) var(--sp-16) var(--sp-24);-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.detail-qa-item{
  background:var(--surface);border-radius:var(--radius-lg);padding:var(--sp-16);
  margin-bottom:var(--sp-8);box-shadow:var(--shadow-sm)
}
.detail-qa-q{
  font-size:var(--font-body);font-weight:600;line-height:var(--leading-title);letter-spacing:var(--tracking-wide);color:var(--text);margin-bottom:var(--sp-8);
  display:flex;gap:var(--sp-8)
}
.detail-qa-q::before{content:'Q';color:var(--coral);font-weight:800;flex-shrink:0}
.detail-qa-a{
  font-size:var(--font-body);color:var(--slate);line-height:var(--leading-body);letter-spacing:var(--tracking-wide);
  display:flex;gap:var(--sp-8)
}
.detail-qa-a::before{content:'A';color:var(--mint);font-weight:800;flex-shrink:0}

/* ========== DARK THEME ========== */
[data-theme="dark"] {
  --tomato-1: #1d1412;
  --tomato-2: #2a1814;
  --tomato-3: #3d1f18;
  --tomato-4: #4f241b;
  --tomato-5: #602c22;
  --tomato-6: #74372c;
  --tomato-7: #92493c;
  --tomato-8: #b85d4c;
  --tomato-9: #e54d2e;
  --tomato-10: #ec6b52;
  --tomato-11: #f4a090;
  --tomato-12: #fed7d0;

  --amber-3: #3a240b;
  --amber-5: #5e320d;
  --amber-6: #713f12;
  --amber-7: #89511a;
  --amber-8: #a86922;
  --amber-9: #ffc53d;
  --amber-10: #f6c340;

  --green-3: #152d22;
  --green-5: #1a4831;
  --green-7: #266d49;
  --green-8: #2f8659;
  --green-9: #30a46c;
  --green-10: #3db87a;

  --sand-2: #1f1e1c;
  --sand-3: #2a2926;
  --sand-4: #353330;
  --sand-6: #4a4743;
  --sand-8: #706b65;
  --sand-11: #a8a39e;
  --sand-12: #f0efed;

  --bg: #151412;
  --surface: var(--sand-2);
  --text: var(--sand-12);
  --text-secondary: var(--sand-11);
  --text-tertiary: var(--sand-8);
  --text-muted: var(--sand-6);
  --border-light: var(--sand-3);
  --border-hover: var(--sand-4);
  --header-bg: rgba(21,20,18,0.85);
  --nav-bg: rgba(31,30,28,0.92);
  --input-bg: var(--sand-3);
  --hover-bg: var(--tomato-2);
  --overlay-bg: var(--sand-3);
  --chat-input-bg: rgba(21,20,18,0.92);
  --hero-bg: linear-gradient(135deg,var(--tomato-3),var(--amber-3));
  --skeleton-bg: var(--sand-3);
  --skeleton-shine: var(--sand-4);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.3);
  --shadow-md:0 2px 8px rgba(0,0,0,0.35);
  --shadow-lg:0 4px 24px rgba(0,0,0,0.4);

  --coral-glow: rgba(229,77,46,0.25);
}
[data-theme="dark"] .profile-card{background:linear-gradient(135deg,var(--sand-4),var(--sand-3))}
[data-theme="dark"] .profile-card::before{background:rgba(255,255,255,0.03)}

/* ========== SKELETON ========== */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,var(--skeleton-bg) 25%,var(--skeleton-shine) 50%,var(--skeleton-bg) 75%);background-size:200% 100%;animation:shimmer 1.2s ease-in-out infinite;border-radius:var(--radius-sm)}

/* ========== UTILITY ========== */
.spacer{flex:1}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="app">

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-title"><i data-lucide="graduation-cap"></i>校园百事通</div>
    <div style="display:flex;gap:var(--sp-4)">
      <span style="font-size:12px;color:var(--text-tertiary);display:flex;align-items:center;gap:4px" id="header-time">
        <i data-lucide="clock" style="width:14px;height:14px"></i><span id="time-display"></span>
      </span>
    </div>
  </header>

  <!-- ===== MAIN SCROLL AREA ===== -->
  <div class="main" id="main-scroll">

    <!-- ===== TAB: 首页 ===== -->
    <div class="tab active" id="tab-home">
      <div class="hero">
        <h2>你好<br>想查什么<span>校园信息</span>？</h2>
        <p>知识库收录了 12 个分类、670+ 条校园问答</p>
        <div class="hero-badge"><i data-lucide="sparkles"></i> AI 智能问答已上线</div>
      </div>

      <div class="search-bar" id="home-search">
        <i data-lucide="search" style="width:18px;height:18px"></i>
        <input type="text" placeholder="搜索校园知识…" id="home-search-input">
      </div>

      <div class="kpi-row" id="kpi-row">
        <div class="kpi-card"><div class="kpi-value" id="kpi-cats"><span class="skeleton" style="display:inline-block;width:40px;height:32px"></span></div><div class="kpi-label">总分类</div></div>
        <div class="kpi-card"><div class="kpi-value" id="kpi-qa"><span class="skeleton" style="display:inline-block;width:60px;height:32px"></span></div><div class="kpi-label">知识条目</div></div>
        <div class="kpi-card"><div class="kpi-value" id="kpi-avg"><span class="skeleton" style="display:inline-block;width:48px;height:32px"></span></div><div class="kpi-label">平均每类</div></div>
      </div>

      <div class="section-header"><h3>快捷入口</h3><a href="#" data-tab="browse">查看全部</a></div>
      <div class="quick-grid" id="quick-grid">
        <div class="quick-item" style="pointer-events:none"><div class="skeleton" style="width:40px;height:40px;border-radius:var(--radius-md)"></div><span class="skeleton" style="width:48px;height:12px"></span></div>
        <div class="quick-item" style="pointer-events:none"><div class="skeleton" style="width:40px;height:40px;border-radius:var(--radius-md)"></div><span class="skeleton" style="width:48px;height:12px"></span></div>
        <div class="quick-item" style="pointer-events:none"><div class="skeleton" style="width:40px;height:40px;border-radius:var(--radius-md)"></div><span class="skeleton" style="width:48px;height:12px"></span></div>
        <div class="quick-item" style="pointer-events:none"><div class="skeleton" style="width:40px;height:40px;border-radius:var(--radius-md)"></div><span class="skeleton" style="width:48px;height:12px"></span></div>
        <div class="quick-item" style="pointer-events:none"><div class="skeleton" style="width:40px;height:40px;border-radius:var(--radius-md)"></div><span class="skeleton" style="width:48px;height:12px"></span></div>
        <div class="quick-item" style="pointer-events:none"><div class="skeleton" style="width:40px;height:40px;border-radius:var(--radius-md)"></div><span class="skeleton" style="width:48px;height:12px"></span></div>
      </div>

      <div class="section-header"><h3 style="display:flex;align-items:center;gap:var(--sp-4)"><i data-lucide="bell" style="width:16px;height:16px;color:var(--coral)"></i>最新通知</h3></div>
      <div class="notice-list" id="notice-list">
        <div class="notice-item" style="pointer-events:none"><div class="skeleton" style="width:8px;height:8px;border-radius:50%"></div><span class="skeleton" style="flex:1;height:14px"></span><span class="skeleton" style="width:40px;height:12px"></span></div>
        <div class="notice-item" style="pointer-events:none"><div class="skeleton" style="width:8px;height:8px;border-radius:50%"></div><span class="skeleton" style="flex:1;height:14px"></span><span class="skeleton" style="width:40px;height:12px"></span></div>
        <div class="notice-item" style="pointer-events:none"><div class="skeleton" style="width:8px;height:8px;border-radius:50%"></div><span class="skeleton" style="flex:1;height:14px"></span><span class="skeleton" style="width:40px;height:12px"></span></div>
      </div>
    </div>

    <!-- ===== TAB: 浏览 ===== -->
    <div class="tab" id="tab-browse">
      <div style="margin:var(--sp-8) 0 var(--sp-4)"><h2 style="font-size:var(--font-subtitle);font-weight:700;line-height:var(--leading-subtitle);letter-spacing:var(--tracking-tight)">分类浏览</h2></div>
      <div class="chip-scroll" id="chip-scroll"></div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>

    <!-- ===== TAB: 智聊 ===== -->
    <div class="tab" id="tab-chat">
      <div class="chat-area" id="chat-area">
        <div class="chat-welcome" id="chat-welcome">
          <div class="logo"><i data-lucide="message-square"></i></div>
          <h3>校园智聊</h3>
          <p>问我关于校园生活的任何问题</p>
          <div class="quick-chips" id="quick-chips"></div>
        </div>
      </div>
      <div class="chat-input-bar">
        <input class="chat-input" id="chat-input" placeholder="输入你的问题…">
        <button class="chat-send" id="chat-send"><i data-lucide="send"></i></button>
      </div>
    </div>

    <!-- ===== TAB: 我的 ===== -->
    <div class="tab" id="tab-profile">
      <div class="profile-card">
        <div class="profile-row">
          <div class="profile-avatar"><i data-lucide="graduation-cap" style="width:28px;height:28px;color:#fff"></i></div>
          <div class="profile-info">
            <h3>校园百事通</h3>
            <p>知识库助手 · 24h 在线</p>
          </div>
        </div>
        <div class="profile-stats" id="profile-stats">
          <div class="profile-stat"><div class="profile-stat-num">—</div><div class="profile-stat-label">分类</div></div>
          <div class="profile-stat"><div class="profile-stat-num">—</div><div class="profile-stat-label">问答</div></div>
          <div class="profile-stat"><div class="profile-stat-num">—</div><div class="profile-stat-label">更新</div></div>
        </div>
      </div>
      <div class="profile-section">
        <h4>设置</h4>
        <div class="profile-list">
          <button class="profile-item"><i data-lucide="bell"></i>消息通知<span class="spacer"></span><span class="arrow" data-lucide="chevron-right"></span></button>
          <button class="profile-item" onclick="toggleTheme()"><i data-lucide="moon"></i>深色模式<span class="spacer"></span><span class="badge" id="theme-status"></span></button>
          <button class="profile-item"><i data-lucide="shield"></i>隐私政策<span class="spacer"></span><span class="arrow" data-lucide="chevron-right"></span></button>
          <button class="profile-item"><i data-lucide="info"></i>关于<span class="spacer"></span><span class="badge">v1.0</span></button>
        </div>
      </div>
      <div class="profile-section">
        <h4>数据来源</h4>
        <div class="profile-list">
          <button class="profile-item"><i data-lucide="database"></i>知识库版本<span class="spacer"></span><span class="arrow" data-lucide="chevron-right"></span></button>
          <button class="profile-item"><i data-lucide="refresh-cw"></i>更新数据<span class="spacer"></span><span class="arrow" data-lucide="chevron-right"></span></button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="nav" id="bottom-nav">
    <button class="nav-btn active" data-tab="home"><i data-lucide="home"></i><span>首页</span></button>
    <button class="nav-btn" data-tab="browse"><i data-lucide="compass"></i><span>浏览</span></button>
    <button class="nav-btn" data-tab="chat"><i data-lucide="message-square"></i><span>智聊</span></button>
    <button class="nav-btn" data-tab="profile"><i data-lucide="user"></i><span>我的</span></button>
  </nav>
</div>

<!-- ===== DETAIL OVERLAY ===== -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-header">
    <button class="detail-back" id="detail-back"><i data-lucide="arrow-left"></i></button>
    <span class="detail-title" id="detail-title">分类</span>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
lucide.createIcons();

// ===== Service Worker =====
try{if('serviceWorker'in navigator)navigator.serviceWorker.register('/static/sw.js')}catch(e){}

// ===== Theme =====
(function(){var t=localStorage.getItem('theme'),d=document.documentElement;if(t){d.setAttribute('data-theme',t)}else if(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches){d.setAttribute('data-theme','dark')}var m=document.querySelector('meta[name="theme-color"]');if(m&&d.getAttribute('data-theme')==='dark')m.setAttribute('content','#151412')})()

function toggleTheme(){
  var d=document.documentElement,on=d.getAttribute('data-theme')==='dark'
  d.setAttribute('data-theme',on?'':'dark')
  localStorage.setItem('theme',on?'':'dark')
  document.querySelector('meta[name="theme-color"]').setAttribute('content',on?'#FDF8F5':'#151412')
  updateThemeUI()
}
function updateThemeUI(){
  var on=document.documentElement.getAttribute('data-theme')==='dark'
  var el=document.getElementById('theme-status')
  if(el)el.textContent=on?'已开启':'已关闭'
}

// ===== Clock =====
function updateClock(){document.getElementById('time-display').textContent=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}
updateClock();setInterval(updateClock,30000)

// ===== Header scroll shadow =====
document.getElementById('main-scroll').addEventListener('scroll',function(){
  document.querySelector('.header').classList.toggle('scrolled',this.scrollTop>1)
})

// ===== Data =====
let allData={}, categoryOrder=[], searchIndex=[]
const ICON_MAP={'图书馆':'book','食堂':'utensils-crossed','宿舍':'building-2','校园服务':'briefcase','选课':'file-text','考试':'clipboard-check','毕业要求':'graduation-cap','奖学金':'award','德育积分':'star','综合素质实践':'users','社团':'heart','其他':'more-horizontal'}
const COLORS=['coral','sunny','mint','slate']

function catColor(i){return COLORS[i%4]}

// ===== Load all data =====
Promise.all([
  fetch('/api/stats').then(r=>r.json()),
  fetch('/api/categories').then(r=>r.json())
]).then(([stats,cats])=>{
  categoryOrder=cats
  document.getElementById('kpi-cats').textContent=stats.categories
  document.getElementById('kpi-qa').textContent=stats.total_qa
  document.getElementById('kpi-avg').textContent=stats.avg_per_category

  // Profile stats
  const ps=document.getElementById('profile-stats')
  ps.innerHTML=
    '<div class="profile-stat"><div class="profile-stat-num">'+stats.categories+'</div><div class="profile-stat-label">分类</div></div>'+
    '<div class="profile-stat"><div class="profile-stat-num">'+stats.total_qa+'</div><div class="profile-stat-label">问答</div></div>'+
    '<div class="profile-stat"><div class="profile-stat-num">'+stats.avg_per_category+'</div><div class="profile-stat-label">平均</div></div>'

  // Load QA per category
  return Promise.all(cats.map(c=>fetch('/api/qa?category='+encodeURIComponent(c)).then(r=>r.json()).then(items=>{allData[c]=items})))
}).then(()=>{
  buildSearchIndex()
  renderQuickGrid()
  renderNoticeList()
  renderBrowse()
  renderQuickChips()
  lucide.createIcons()
  updateThemeUI()
}).catch(function(){updateThemeUI()})

function buildSearchIndex(){
  searchIndex=[]
  for(const c of categoryOrder)for(const i of(allData[c]||[]))searchIndex.push({category:c,question:i.question,answer:i.answer})
}

// ===== Quick Grid =====
function renderQuickGrid(){
  const g=document.getElementById('quick-grid')
  const items=categoryOrder.slice(0,6)
  g.innerHTML=items.map((c,i)=>{
    const icon=ICON_MAP[c]||'file'
    return '<button class="quick-item" data-cat="'+c+'"><div class="quick-icon '+catColor(i)+'"><i data-lucide="'+icon+'"></i></div>'+c+'</button>'
  }).join('')
  g.querySelectorAll('.quick-item').forEach(el=>el.addEventListener('click',()=>openCategory(el.dataset.cat)))
  lucide.createIcons()
}

// ===== Notice List =====
function renderNoticeList(){
  const list=document.getElementById('notice-list')
  const notices=[]
  for(const c of categoryOrder){
    const items=allData[c]||[]
    if(items.length)notices.push({cat:c,count:items.length,q:items[0].question})
  }
  list.innerHTML=notices.slice(0,5).map((n,i)=>
    '<div class="notice-item" data-cat="'+n.cat+'"><div class="notice-dot '+catColor(i)+'"></div><span class="notice-text">【'+n.cat+'】'+n.q+'</span><span class="notice-time">'+n.count+' 条</span></div>'
  ).join('')
  list.querySelectorAll('.notice-item').forEach(el=>el.addEventListener('click',()=>openCategory(el.dataset.cat)))
}

// ===== Browse Tab =====
let activeChip=0
function renderBrowse(){
  const chips=document.getElementById('chip-scroll')
  chips.innerHTML=categoryOrder.map((c,i)=>'<button class="chip'+(i===0?' active':'')+'" data-idx="'+i+'">'+c+'</button>').join('')
  chips.querySelectorAll('.chip').forEach(el=>el.addEventListener('click',()=>{
    chips.querySelector('.active')?.classList.remove('active')
    el.classList.add('active')
    activeChip=parseInt(el.dataset.idx)
    renderCatGrid(activeChip)
  }))
  renderCatGrid(0)
}

function renderCatGrid(idx){
  const grid=document.getElementById('cat-grid')
  const cat=categoryOrder[idx]
  const items=allData[cat]||[]
  const icon=ICON_MAP[cat]||'file'
  grid.innerHTML='<button class="cat-card" style="grid-column:1/-1" data-cat="'+cat+'"><div class="cat-card-icon '+catColor(idx)+'"><i data-lucide="'+icon+'"></i></div><div class="cat-card-info"><div class="cat-card-name">'+cat+'</div><div class="cat-card-count">共 '+items.length+' 条问答</div></div><i data-lucide="chevron-right" class="cat-card-arrow"></i></button>'
  grid.querySelector('.cat-card').addEventListener('click',()=>openCategory(cat))
  lucide.createIcons()
}

// ===== Chat =====
let chatHistory=[]
function renderQuickChips(){
  const chips=document.getElementById('quick-chips')
  const questions=['图书馆几点开门？','食堂有什么好吃的？','宿舍几点关门？','怎么选课？']
  chips.innerHTML=questions.map(q=>'<button class="quick-chip">'+q+'</button>').join('')
  chips.querySelectorAll('.quick-chip').forEach(el=>el.addEventListener('click',()=>{
    document.getElementById('chat-input').value=el.textContent
    doChat(el.textContent)
  }))
}

function addChatMsg(text,isUser){
  const area=document.getElementById('chat-area')
  const welcome=document.getElementById('chat-welcome')
  if(welcome)welcome.style.display='none'
  const div=document.createElement('div')
  div.className='chat-msg '+(isUser?'user':'bot')
  div.innerHTML='<div class="chat-avatar '+(isUser?'user':'bot')+'">'+(isUser?'我':'AI')+'</div><div class="chat-bubble">'+text+'</div>'
  area.appendChild(div)
  area.scrollTop=area.scrollHeight
  lucide.createIcons()
}

document.getElementById('chat-send').addEventListener('click',()=>{
  const input=document.getElementById('chat-input')
  if(input.value.trim())doChat(input.value.trim())
})
document.getElementById('chat-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&this.value.trim())doChat(this.value.trim())
})

function doChat(q){
  const input=document.getElementById('chat-input')
  input.value=''
  addChatMsg(q,true)
  // Typing indicator
  const area=document.getElementById('chat-area')
  const typing=document.createElement('div')
  typing.className='chat-msg bot typing'
  typing.innerHTML='<div class="chat-avatar bot">AI</div><div class="chat-bubble"><span class="typing-dots"><span>.</span><span>.</span><span>.</span></span></div>'
  area.appendChild(typing)
  area.scrollTop=area.scrollHeight
  fetch('/api/handbook',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})})
  .then(r=>r.json()).then(function(d){
    typing.remove()
    addChatMsg(d.answer+'<br><span style="font-size:12px;opacity:0.6">来源：'+d.category+' · '+d.related+'</span>',false)
  }).catch(function(){
    typing.remove()
    addChatMsg('网络异常，请稍后再试',false)
  })
}

// ===== Category Detail =====
function openCategory(cat){
  const items=allData[cat]||[]
  document.getElementById('detail-title').textContent=cat
  const body=document.getElementById('detail-body')
  if(items.length===0){
    body.innerHTML='<div style="text-align:center;padding:48px 16px;color:var(--text-tertiary)">暂无数据</div>'
  }else{
    body.innerHTML=items.map(i=>'<div class="detail-qa-item"><div class="detail-qa-q">'+i.question+'</div><div class="detail-qa-a">'+i.answer+'</div></div>').join('')
  }
  document.getElementById('detail-overlay').classList.add('open')
  document.getElementById('main-scroll').scrollTop=0
}
document.getElementById('detail-back').addEventListener('click',function(){
  var o=document.getElementById('detail-overlay');
  o.classList.add('closing');
  o.addEventListener('animationend',function(){o.classList.remove('open','closing')},{once:true})
})

// ===== Tab Switching =====
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'))
    btn.classList.add('active')
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
    var t=document.getElementById('tab-'+btn.dataset.tab)
    void t.offsetHeight
    t.classList.add('active')
    document.getElementById('main-scroll').scrollTop=0
  })
})
document.querySelector('.section-header a[data-tab="browse"]')?.addEventListener('click',function(e){
  e.preventDefault()
  document.querySelector('.nav-btn[data-tab="browse"]').click()
})

// ===== Home Search =====
document.getElementById('home-search-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&this.value.trim()){
    const q=this.value.trim()
    document.querySelector('.nav-btn[data-tab="chat"]').click()
    document.getElementById('chat-input').value=q
    doChat(q)
  }
})
document.getElementById('home-search').addEventListener('click',function(e){
  if(e.target.tagName!=='INPUT')this.querySelector('input').focus()
})

// ===== Keyboard Shortcuts =====
document.addEventListener('keydown',function(e){
  if(e.key==='/'&&e.target.tagName!=='INPUT'&&e.target.tagName!=='TEXTAREA'){
    e.preventDefault()
    var inp=document.getElementById('home-search-input')
    if(inp)inp.focus()
  }
  if(e.key==='Escape'){
    var o=document.getElementById('detail-overlay')
    if(o.classList.contains('open'))document.getElementById('detail-back').click()
  }
})
</script>
</body>
</html>
