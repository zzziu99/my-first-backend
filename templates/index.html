<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>校园百事通 · 概览</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* ============================================================
   TOKENS — ≤5 colors: 1 primary + 3 semantic + grayscale
   ============================================================ */
:root {
  --primary: #4F6CF7;
  --success: #22C55E;
  --warning: #F59E0B;
  --error: #EF4444;
  --bg: #F9FAFB;
  --surface: #FFFFFF;
  --text: #111827;
  --text-secondary: #6B7280;
  --text-tertiary: #9CA3AF;
  --border: #E5E7EB;
}

/* ============================================================
   RESET
   ============================================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body {
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   12-COLUMN GRID — max-width 1200px, gutter 16px, page padding 24px
   ============================================================ */
.page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 16px;
}

.col-span-4  { grid-column: span 4 }
.col-span-6  { grid-column: span 6 }
.col-span-12 { grid-column: span 12 }

/* ============================================================
   SPACING (8pt system: 4,8,16,24,32,48,64 only)
   ============================================================ */
.section  { margin-top: 32px }
.section:first-child { margin-top: 0 }

.gap-8  { gap: 8px }
.gap-16 { gap: 16px }
.mt-16  { margin-top: 16px }
.mb-16  { margin-bottom: 16px }

/* ============================================================
   TYPOGRAPHY — strict: KPI 32px bold · Title 18px s/lh1.2 · Body 14px · Sec 12px
   ============================================================ */
.kpi-value { font-size: 32px; font-weight: 700; line-height: 1; color: var(--text) }

.section-title {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.2;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title i { color: var(--text-tertiary) }

.body-text  { font-size: 14px; line-height: 1.5; color: var(--text) }
.sec-text   { font-size: 12px; color: var(--text-secondary) }

/* ============================================================
   CARD — immutable: radius 16px · padding 16px · fixed shadow · no variation
   ============================================================ */
.card {
  background: var(--surface);
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.04);
  transition: all 200ms ease;
}
.card:hover  { transform: translateY(-2px) }
.card:active { transform: scale(0.98) }

/* ============================================================
   KPI — height 120px · max 3 per row · value + label + trend (↑↓)
   ============================================================ */
.kpi {
  height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.kpi-label {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 4px;
}
.kpi-trend {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.kpi-trend.up   { color: var(--success) }
.kpi-trend.down { color: var(--error) }

/* ============================================================
   LIST — flat (no card style) · 72px · 16px padding · #E5E7EB divider · #F9FAFB hover
   ============================================================ */
.list {
  background: var(--surface);
  border-radius: 0;
  box-shadow: none;
}
.list-item {
  height: 72px;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #E5E7EB;
  cursor: pointer;
  transition: background 200ms ease;
}
.list-item:last-child { border-bottom: none }
.list-item:hover  { background: #F9FAFB }
.list-item:active { transform: scale(0.98) }
.list-item-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
.list-item-icon {
  width: 20px; height: 20px;
  color: var(--text-tertiary);
  flex-shrink: 0;
}
.list-item-text {
  font-size: 14px;
  color: var(--text);
}
.list-item-count {
  font-size: 12px;
  color: var(--text-secondary);
}
.list-item-arrow {
  width: 16px; height: 16px;
  color: var(--text-tertiary);
}

/* ============================================================
   HEADER
   ============================================================ */
.header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 24px 0;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.2;
}
.header-icon {
  width: 24px; height: 24px;
  color: var(--primary);
}

/* ============================================================
   SEARCH / ACTION
   ============================================================ */
.search-box {
  display: flex;
  gap: 8px;
}
.search-input {
  flex: 1;
  height: 40px;
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.5;
  outline: none;
  transition: border-color 200ms ease;
}
.search-input:focus {
  border-color: var(--primary);
}
.search-input::placeholder {
  color: var(--text-tertiary);
}
.search-btn {
  height: 40px;
  padding: 8px 24px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 200ms ease;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.search-btn:hover  { transform: translateY(-2px) }
.search-btn:active { transform: scale(0.98) }
.search-btn i { color: #fff }

.search-result {
  margin-top: 16px;
  padding: 16px;
  background: var(--bg);
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.5;
  display: none;
}
.search-result.show { display: block }
.search-result .answer-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.search-result .answer-source {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 8px;
}
</style>
</head>
<body>

<div class="page">

  <!-- ═══ HEADER ═══ -->
  <div class="header">
    <i data-lucide="graduation-cap" class="header-icon"></i>
    <h1>校园百事通</h1>
  </div>

  <!-- ═══ KPI SECTION — highest priority, top-left dominant ═══ -->
  <div class="grid section">
    <div class="card kpi col-span-4">
      <div class="kpi-value" id="kpi-categories">—</div>
      <div class="kpi-label">总分类</div>
      <div class="kpi-trend" id="trend-categories"></div>
    </div>
    <div class="card kpi col-span-4">
      <div class="kpi-value" id="kpi-qa">—</div>
      <div class="kpi-label">知识条目</div>
      <div class="kpi-trend" id="trend-qa"></div>
    </div>
    <div class="card kpi col-span-4">
      <div class="kpi-value" id="kpi-avg">—</div>
      <div class="kpi-label">平均每类</div>
      <div class="kpi-trend" id="trend-avg"></div>
    </div>
  </div>

  <!-- ═══ ACTIONS SECTION — functional entry ═══ -->
  <div class="grid section">
    <div class="card col-span-12">
      <div class="search-box">
        <input type="text" class="search-input" id="search-input" placeholder="搜索校园知识…">
        <button class="search-btn" id="search-btn">
          <i data-lucide="search" size="16"></i>
          搜索
        </button>
      </div>
      <div class="search-result" id="search-result"></div>
    </div>
  </div>

  <!-- ═══ CONTENT SECTION — category list ═══ -->
  <div class="grid section">
    <div class="col-span-12">
      <div class="section-title">
        <i data-lucide="book-open"></i>
        分类导航
      </div>
      <div class="list" id="category-list">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

</div>

<script>
lucide.createIcons();

/* ========== Load KPI data ========== */
fetch('/api/stats')
  .then(r => r.json())
  .then(d => {
    document.getElementById('kpi-categories').textContent = d.categories;
    document.getElementById('kpi-qa').textContent = d.total_qa;
    document.getElementById('kpi-avg').textContent = d.avg_per_category;
    updateTrend('trend-categories', d.categories, 0);
    updateTrend('trend-qa', d.total_qa, d.categories);
    updateTrend('trend-avg', d.avg_per_category, 0);
  })
  .catch(() => {});

function updateTrend(id, val, ref) {
  const el = document.getElementById(id);
  if (!el) return;
  if (ref && ref > 0 && val > ref) {
    el.className = 'kpi-trend up';
    el.innerHTML = '<i data-lucide="trending-up" size="14"></i> 较均值高 ' + Math.round((val - ref) / ref * 100) + '%';
  } else if (ref && ref > 0 && val < ref) {
    el.className = 'kpi-trend down';
    el.innerHTML = '<i data-lucide="trending-down" size="14"></i> 较均值低 ' + Math.round((ref - val) / ref * 100) + '%';
  } else {
    el.innerHTML = '<span>— 稳定</span>';
  }
  lucide.createIcons();
}

/* ========== Load category list ========== */
let categories = [];
fetch('/api/categories')
  .then(r => r.json())
  .then(list => {
    categories = list;
    const container = document.getElementById('category-list');
    container.innerHTML = list.map(c => {
      const iconMap = {
        '图书馆':'book','食堂':'utensils-crossed','宿舍':'building-2',
        '校园服务':'briefcase','选课':'file-text','考试':'clipboard-check',
        '毕业要求':'graduation-cap','奖学金':'award','德育积分':'star',
        '综合素质实践':'users','社团':'heart','其他':'more-horizontal'
      };
      const icon = iconMap[c] || 'file';
      return '<div class="list-item" data-category="' + c + '">'
        + '<div class="list-item-left">'
        + '<i data-lucide="' + icon + '" class="list-item-icon"></i>'
        + '<span class="list-item-text">' + c + '</span>'
        + '</div>'
        + '<i data-lucide="chevron-right" class="list-item-arrow"></i>'
        + '</div>';
    }).join('');
    lucide.createIcons();
  })
  .catch(() => {});

/* ========== Search ========== */
document.getElementById('search-btn').addEventListener('click', doSearch);
document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  const el = document.getElementById('search-result');
  if (!q) { el.classList.remove('show'); return; }

  el.innerHTML = '<div class="answer-label"><i data-lucide="loader" size="14"></i> 搜索中…</div>';
  el.classList.add('show');
  lucide.createIcons();

  fetch('/api/handbook', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({question: q})
  })
  .then(r => r.json())
  .then(d => {
    el.innerHTML = '<div class="answer-label"><i data-lucide="message-circle" size="14"></i> 回答</div>'
      + '<div>' + d.answer + '</div>'
      + (d.category ? '<div class="answer-source">来源：' + d.category + ' · ' + d.related + '</div>' : '');
    lucide.createIcons();
  })
  .catch(() => {
    el.innerHTML = '<div class="answer-label" style="color:var(--error)"><i data-lucide="alert-circle" size="14"></i> 搜索失败</div>';
    lucide.createIcons();
  });
}

/* ========== Category click ========== */
document.getElementById('category-list').addEventListener('click', function(e) {
  const item = e.target.closest('.list-item');
  if (!item) return;
  const cat = item.dataset.category;
  document.getElementById('search-input').value = cat;
  doSearch();
});
</script>
</body>
</html>
